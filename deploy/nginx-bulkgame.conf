# Install: copy to /etc/nginx/sites-available/bulkgame and symlink sites-enabled.
# App root on VPS: /var/www/bulkgame. Gunicorn: 127.0.0.1:8001 (see gunicorn.service).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 104.236.1.98 _;

    root /var/www/html;
    index welcome.html;

    location = / {
        try_files /welcome.html =404;
    }

    location /bulkgame/static/ {
        alias /var/www/bulkgame/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /bulkgame/media/ {
        alias /var/www/bulkgame/media/;
        expires 7d;
    }

    location /bulkgame/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
