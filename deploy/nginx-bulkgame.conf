# Subpath deploy: site at http://SERVER/bulkgame/ — see deploy/VPS.md (Option B).
# App root: /var/www/bulkgame | Gunicorn: 127.0.0.1:8001 | .env: FORCE_SCRIPT_NAME=/bulkgame

# Only one site should use default_server on :80. Disable Ubuntu's default first:
#   sudo rm /etc/nginx/sites-enabled/default
# Then enable this site: sudo ln -sf /etc/nginx/sites-available/bulkgame /etc/nginx/sites-enabled/
server {
    listen 80;
    listen [::]:80;
    server_name 104.236.1.98 _;

    root /var/www/html;
    index welcome.html;

    location = / {
        try_files /welcome.html =404;
    }

    location /bulkgame/static/ {
        alias /var/www/bulkgame/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /bulkgame/media/ {
        alias /var/www/bulkgame/media/;
        expires 7d;
    }

    location /bulkgame/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
