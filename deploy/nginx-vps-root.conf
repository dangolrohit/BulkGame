# Django at domain root (e.g. https://fbtools.yourdomain.com/)
# Copy to /etc/nginx/sites-available/bulkgame, set server_name, then enable + certbot.
# App dir: /var/www/bulkgame | Gunicorn: 127.0.0.1:8002
# .env: leave FORCE_SCRIPT_NAME empty; set ALLOWED_HOSTS + CSRF_TRUSTED_ORIGINS to this domain.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/bulkgame/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/bulkgame/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
